<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Matrices Universitaria</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; width: 100%; margin-top: 40px; }
        h2 { text-align: center; color: #1a365d; margin-top: 0; }
        
        /* Controles de configuración */
        .controls { display: flex; gap: 15px; margin-bottom: 20px; background: #e2e8f0; padding: 15px; border-radius: 8px; align-items: center; justify-content: center; flex-wrap: wrap;}
        .controls select, .controls input { padding: 8px; border-radius: 5px; border: 1px solid #cbd5e0; }
        .controls input { width: 60px; text-align: center; }
        
        button { padding: 10px 20px; background-color: #3182ce; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2b6cb0; }
        
        /* Contenedor dinámico donde JS va a inyectar las matrices */
        #workspace { display: flex; gap: 30px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        
        .matrix-wrapper { display: flex; flex-direction: column; align-items: center; }
        .matrix-label { font-weight: bold; color: #2d3748; margin-bottom: 10px; }
        
        /* La grilla dinámica */
        .dynamic-grid { display: grid; gap: 5px; padding: 10px; border-left: 3px solid #1a365d; border-right: 3px solid #1a365d; background: #f7fafc; border-radius: 4px; }
        .dynamic-grid input { width: 50px; height: 50px; text-align: center; font-size: 16px; border: 1px solid #cbd5e0; border-radius: 4px; }
        .dynamic-grid input:focus { border-color: #3182ce; outline: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Calculadora de Matrices</h2>
    
    <div class="controls">
        <label>Operación:</label>
        <select id="operation" onchange="setupWorkspace()">
            <option value="det">Determinante |A|</option>
            <option value="mult">Multiplicación A × B</option>
        </select>

        <label>Filas:</label>
        <input type="number" id="rows" value="3" min="2" max="5" onchange="setupWorkspace()">
        
        <label>Columnas:</label>
        <input type="number" id="cols" value="3" min="2" max="5" onchange="setupWorkspace()">
    </div>

    <div id="workspace"></div>

    <button style="width: 100%; margin-top: 20px;" onclick="calcular()">Resolver</button>
</div>

<script>
    // Esta función se ejecuta cada vez que cambias el tamaño o la operación
    function setupWorkspace() {
        let op = document.getElementById('operation').value;
        let rows = parseInt(document.getElementById('rows').value);
        let cols = parseInt(document.getElementById('cols').value);
        let workspace = document.getElementById('workspace');
        
        workspace.innerHTML = ""; // Limpiamos la mesa de trabajo

        if (op === 'det') {
            // Para determinantes, la matriz debe ser cuadrada
            document.getElementById('cols').value = rows; 
            crearMatrizUI(workspace, 'Matriz A', rows, rows, 'A');
        } else if (op === 'mult') {
            // Para multiplicar, necesitamos dos matrices
            crearMatrizUI(workspace, 'Matriz A', rows, cols, 'A');
            // La matriz B debe tener tantas filas como columnas tiene la A
            crearMatrizUI(workspace, 'Matriz B', cols, rows, 'B'); 
        }
    }

    // El motor que dibuja los inputs en pantalla
    function crearMatrizUI(container, titulo, filas, columnas, idPrefix) {
        let wrapper = document.createElement('div');
        wrapper.className = 'matrix-wrapper';
        
        let label = document.createElement('div');
        label.className = 'matrix-label';
        label.innerText = titulo + ` (${filas}x${columnas})`;
        
        let grid = document.createElement('div');
        grid.className = 'dynamic-grid';
        grid.style.gridTemplateColumns = `repeat(${columnas}, 1fr)`; // CSS dinámico
        
        // Bucles anidados: pura lógica de Álgebra
        for (let i = 0; i < filas; i++) {
            for (let j = 0; j < columnas; j++) {
                let input = document.createElement('input');
                input.type = 'number';
                input.placeholder = `${idPrefix}${i+1}${j+1}`; // Ejemplo: A11, A12
                input.id = `${idPrefix}_${i}_${j}`;
                grid.appendChild(input);
            }
        }
        
        wrapper.appendChild(label);
        wrapper.appendChild(grid);
        container.appendChild(wrapper);
    }

    // Iniciamos la mesa de trabajo al cargar la página
    window.onload = setupWorkspace;

    function calcular() {
        alert("¡La interfaz dinámica funciona! Falta programar la matemática.");
    }
</script>

</body>
</html>
