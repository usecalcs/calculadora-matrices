<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Matrices Universitaria</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 800px; width: 100%; margin-top: 40px; }
        h2 { text-align: center; color: #1a365d; margin-top: 0; }
        
        .controls-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 15px; border-radius: 8px; }
        .controls-row { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .controls-row select, .controls-row input { padding: 8px; border-radius: 5px; border: 1px solid #cbd5e0; }
        .controls-row input { width: 60px; text-align: center; }
        
        button { padding: 12px 20px; background-color: #3182ce; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; width: 100%; margin-top: 10px; }
        button:hover { background-color: #2b6cb0; }
        
        #workspace { display: flex; gap: 30px; justify-content: center; margin-top: 20px; flex-wrap: wrap; position: relative; }
        .matrix-wrapper { display: flex; flex-direction: column; align-items: center; }
        .matrix-label { font-weight: bold; color: #2d3748; margin-bottom: 10px; background: #edf2f7; padding: 5px 15px; border-radius: 15px; }
        
        .dynamic-grid { display: grid; gap: 5px; padding: 10px; border-left: 3px solid #1a365d; border-right: 3px solid #1a365d; background: #f7fafc; border-radius: 4px; }
        .dynamic-grid input { width: 50px; height: 50px; text-align: center; font-size: 16px; border: 1px solid #cbd5e0; border-radius: 4px; }
        .dynamic-grid input:focus { border-color: #3182ce; outline: none; }

        .error-msg { width: 100%; text-align: center; color: #e53e3e; font-weight: bold; margin-top: 15px; background: #fff5f5; padding: 10px; border-radius: 5px; border: 1px solid #feb2b2; }
        .res-det { font-size: 32px; font-weight: bold; color: #1a365d; padding: 20px; background: #ebf8ff; border-radius: 8px; display: inline-block; border: 2px solid #3182ce; margin-top: 10px; }
        
        /* El Pizarrón del Paso a Paso */
        #step-by-step-box { margin-top: 30px; padding: 25px; background-color: #2c5282; border-radius: 8px; color: white; display: none; }
        #step-by-step-box h3 { border-bottom: 2px solid #90cdf4; padding-bottom: 10px; color: #90cdf4; margin-top: 0; }
        .step-entry { font-family: 'Courier New', Courier, monospace; font-size: 15px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 5px; margin-bottom: 8px; }
        .step-coord { font-weight: bold; color: #f6e05e; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Calculadora de Matrices Universitaria</h2>
    
    <div class="controls-group">
        <div class="controls-row">
            <label style="font-weight: bold;">Operación:</label>
            <select id="operation" onchange="actualizarInterfaz()">
                <option value="mult" selected>Multiplicación A × B (con Paso a Paso)</option>
                <option value="det">Determinante |A|</option>
                <option value="tras">Traspuesta de A</option>
                <option value="inv">Inversa de A (A⁻¹)</option>
            </select>
        </div>
        
        <div class="controls-row">
            <span style="font-weight: bold; color: #2b6cb0; width: 80px;">Matriz A:</span>
            <label>Filas:</label>
            <input type="number" id="rowsA" value="2" min="1" max="5" onchange="setupWorkspace()">
            <label id="labelColsA">Columnas:</label>
            <input type="number" id="colsA" value="3" min="1" max="5" onchange="setupWorkspace()">
        </div>

        <div class="controls-row" id="panel-matriz-b">
            <span style="font-weight: bold; color: #2b6cb0; width: 80px;">Matriz B:</span>
            <label>Filas:</label>
            <input type="number" id="rowsB" value="3" min="1" max="5" onchange="setupWorkspace()">
            <label>Columnas:</label>
            <input type="number" id="colsB" value="2" min="1" max="5" onchange="setupWorkspace()">
        </div>
    </div>

    <div id="workspace"></div>

    <button onclick="calcular()">Resolver Operación</button>
</div>

<script>
    function actualizarInterfaz() {
        let op = document.getElementById('operation').value;
        let panelB = document.getElementById('panel-matriz-b');
        let rowsA = document.getElementById('rowsA');
        let colsA = document.getElementById('colsA');

        if (op === 'det' || op === 'inv') {
            panelB.style.display = 'none';
            colsA.value = rowsA.value; // Forzamos cuadrada
        } else if (op === 'tras') {
            panelB.style.display = 'none';
        } else {
            panelB.style.display = 'flex';
        }
        setupWorkspace();
    }

    function setupWorkspace() {
        let op = document.getElementById('operation').value;
        let rowsA = parseInt(document.getElementById('rowsA').value) || 1;
        let colsA = parseInt(document.getElementById('colsA').value) || 1;
        
        let workspace = document.getElementById('workspace');
        workspace.innerHTML = ""; // Limpiamos matrices y resultados viejos

        if (op === 'det' || op === 'inv') {
            document.getElementById('colsA').value = rowsA; 
            crearMatrizUI(workspace, 'Matriz A', rowsA, rowsA, 'A');
        } else if (op === 'tras') {
            crearMatrizUI(workspace, 'Matriz A', rowsA, colsA, 'A');
        } else if (op === 'mult') {
            let rowsB = parseInt(document.getElementById('rowsB').value) || 1;
            let colsB = parseInt(document.getElementById('colsB').value) || 1;
            crearMatrizUI(workspace, 'Matriz A', rowsA, colsA, 'A');
            crearMatrizUI(workspace, 'Matriz B', rowsB, colsB, 'B');
            
            if (colsA !== rowsB) {
                let error = document.createElement('div');
                error.className = 'error-msg';
                error.innerText = `⚠️ Error Álgebra: Columnas de A (${colsA}) deben ser iguales a las filas de B (${rowsB}).`;
                workspace.appendChild(error);
            }
        }
    }

    function crearMatrizUI(container, titulo, filas, columnas, idPrefix) {
        let wrapper = document.createElement('div');
        wrapper.className = 'matrix-wrapper';
        let label = document.createElement('div');
        label.className = 'matrix-label';
        label.innerText = `${titulo} (${filas}×${columnas})`;
        let grid = document.createElement('div');
        grid.className = 'dynamic-grid';
        grid.style.gridTemplateColumns = `repeat(${columnas}, 1fr)`;
        for (let i = 0; i < filas; i++) {
            for (let j = 0; j < columnas; j++) {
                let input = document.createElement('input');
                input.type = 'number';
                input.placeholder = `${idPrefix}${i+1}${j+1}`;
                input.id = `${idPrefix}_${i}_${j}`;
                grid.appendChild(input);
            }
        }
        wrapper.appendChild(label);
        wrapper.appendChild(grid);
        container.appendChild(wrapper);
    }

    window.onload = actualizarInterfaz;

    function calcular() {
        let op = document.getElementById('operation').value;
        let rowsA = parseInt(document.getElementById('rowsA').value);
        let colsA = parseInt(document.getElementById('colsA').value);
        
        let viejoResultado = document.getElementById('contenedor-resultado');
        if (viejoResultado) viejoResultado.remove();
        
        // Limpiamos el pizarrón viejo
        document.getElementById('step-by-step-box')?.remove();

        let matrizA = extraerMatriz('A', rowsA, colsA);

        if (op === 'mult') {
            let rowsB = parseInt(document.getElementById('rowsB').value);
            let colsB = parseInt(document.getElementById('colsB').value);
            if (colsA !== rowsB) { alert("Error de dimensiones matriciales"); return; }
            let matrizB = extraerMatriz('B', rowsB, colsB);
            
            // LA MAGIA: Llamamos a la función que devuelve el resultado y la explicación
            let calculoObj = multiplicarPasoAPaso(matrizA, matrizB);
            
            // 1. Dibujamos la matriz resultante
            dibujarResultado(calculoObj.resultado, `Resultado A × B (${rowsA}×${colsB})`);
            
            // 2. Imprimimos el desarrollo en el pizarrón
            imprimirPasoAPaso(calculoObj.explicacion, rowsA, colsB);
            
        } else if (op === 'det') {
            mostrarResultadoUnico(`Determinante |A|`, obtenerDeterminante(matrizA));
        } else if (op === 'tras') {
            dibujarResultado(trasponer(matrizA), "Matriz Traspuesta Aᵀ");
        } else if (op === 'inv') {
            let d = obtenerDeterminante(matrizA);
            if (d === 0) { alert("La determinante es 0. Matriz singular."); return; }
            dibujarResultado(invertir(matrizA, d), "Matriz Inversa A⁻¹");
        }
    }

    // --- LÓGICA MATEMÁTICA ---

    function extraerMatriz(p, f, c) {
        let m = [];
        for (let i = 0; i < f; i++) {
            let fila = [];
            for (let j = 0; j < c; j++) fila.push(parseFloat(document.getElementById(`${p}_${i}_${j}`).value) || 0);
            m.push(fila);
        }
        return m;
    }

    // REFACTOR: Triple bucle for para Multiplicación con Paso a Paso
    function multiplicarPasoAPaso(A, B) {
        let filasA = A.length, colA = A[0].length, colB = B[0].length;
        let resultado = Array.from({length: filasA}, () => Array(colB).fill(0));
        let explicacion = [];

        for (let i = 0; i < filasA; i++) {
            resultado[i] = [];
            for (let j = 0; j < colB; j++) {
                let suma = 0;
                let textoDeLaSuma = ""; // Acá armamos la cadena (ej: " (2x1) + (3x5) ")
                
                for (let k = 0; k < colA; k++) {
                    suma += A[i][k] * B[k][j];
                    // Formateamos para que aparezca " (2 × 5) "
                    textoDeLaSuma += ` (${A[i][k]} × ${B[k][j]}) `;
                    // Agregamos el "+" si no es el último término
                    if (k < colA - 1) textoDeLaSuma += "+";
                }
                resultado[i][j] = suma;
                
                // Guardamos la explicación: Coordenada, cuenta y resultado final de la posición
                explicacion.push({
                    coord: `C${i+1}${j+1}`, // ej: C11, C12
                    formula: textoDeLaSuma, // ej: " (2x1) + (3x5) "
                    valorFinal: suma       // ej: 17
                });
            }
        }
        // Devolvemos un objeto con las dos cosas
        return { resultado, explicacion };
    }

    function trasponer(M) {
        return M[0].map((_, c) => M.map(r => r[c]));
    }

    function obtenerDeterminante(M) {
        if (M.length === 1) return M[0][0];
        if (M.length === 2) return M[0][0]*M[1][1] - M[0][1]*M[1][0];
        return M[0].reduce((acc, val, j) => acc + (j%2===0?1:-1) * val * obtenerDeterminante(obtenerSubmatriz(M, 0, j)), 0);
    }

    function obtenerSubmatriz(M, f, c) {
        return M.filter((_, i) => i !== f).map(row => row.filter((_, j) => j !== c));
    }

    function invertir(M, det) {
        let n = M.length;
        if (n === 1) return [[1/det]];
        let adj = [];
        for (let i=0; i<n; i++) {
            let fila = [];
            for (let j=0; j<n; j++) fila.push(((i+j)%2===0?1:-1) * obtenerDeterminante(obtenerSubmatriz(M, i, j)));
            adj.push(fila);
        }
        return trasponer(adj).map(row => row.map(val => Number((val/det).toFixed(3))));
    }

    function mostrarResultadoUnico(titulo, valor) {
        let app = document.querySelector('.app-container');
        let div = document.createElement('div');
        div.id = 'contenedor-resultado'; div.style.textAlign = "center"; div.style.marginTop = "30px";
        div.innerHTML = `<h3>${titulo}</h3><div class="res-det">${valor}</div>`;
        app.appendChild(div);
    }

    function dibujarResultado(matriz, titulo) {
        let app = document.querySelector('.app-container');
        let cont = document.createElement('div');
        cont.id = 'contenedor-resultado'; cont.style.marginTop = "30px"; cont.style.textAlign = "center";
        let grid = document.createElement('div');
        grid.className = 'dynamic-grid'; grid.style.gridTemplateColumns = `repeat(${matriz[0].length}, 1fr)`;
        grid.style.display = "inline-grid"; grid.style.background = "#ebf8ff";
        matriz.flat().forEach(val => {
            let d = document.createElement('div');
            d.style.padding = "15px"; d.style.background = "white"; d.style.border = "1px solid #90cdf4";
            d.style.fontWeight = "bold"; d.innerText = val;
            grid.appendChild(d);
        });
        cont.innerHTML = `<h3 style="color:#2b6cb0">${titulo}</h3>`;
        cont.appendChild(grid);
        app.appendChild(cont);
    }
    
    // Función nueva que dibuja el pizarrón azul
    function imprimirPasoAPaso(explicacion) {
        let app = document.querySelector('.app-container');
        
        let pizarrón = document.createElement('div');
        pizarrón.id = 'step-by-step-box';
        pizarrón.style.display = "block"; // Lo encendemos
        
        let titulo = document.createElement('h3');
        titulo.innerText = "Desarrollo del Cálculo (Paso a Paso)";
        pizarrón.appendChild(titulo);
        
        // Recorremos el Array de explicaciones que armamos en el motor
        explicacion.forEach(paso => {
            let linea = document.createElement('div');
            linea.className = 'step-entry';
            // Usamos HTML dentro para pintar las coordenadas de amarillo
            linea.innerHTML = `<span class="step-coord">${paso.coord}</span> = ${paso.formula} = <span style="color:white; font-weight:bold;">${paso.valorFinal}</span>`;
            pizarrón.appendChild(linea);
        });
        
        app.appendChild(pizarrón);
    }
</script>
</body>
</html>
