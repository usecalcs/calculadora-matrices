<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Matrices 3x3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 400px; width: 100%; margin-top: 40px; }
        h2 { text-align: center; color: #1a365d; margin-top: 0; }
        p.subtitle { text-align: center; color: #4a5568; font-size: 14px; margin-bottom: 25px; }
        
        /* El diseño de la grilla de la matriz */
        .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; padding: 15px; background: #e2e8f0; border-radius: 8px; border-left: 4px solid #1a365d; border-right: 4px solid #1a365d; }
        .matrix-grid input { width: 100%; height: 45px; text-align: center; font-size: 18px; border: 1px solid #cbd5e0; border-radius: 5px; box-sizing: border-box; outline: none; transition: border 0.3s; }
        .matrix-grid input:focus { border-color: #3182ce; box-shadow: 0 0 0 2px rgba(49, 130, 206, 0.2); }
        
        button { width: 100%; padding: 15px; background-color: #3182ce; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2b6cb0; }
        
        /* Caja de Resultados */
        .result-box { margin-top: 25px; padding: 20px; background-color: #ebf8ff; border-radius: 8px; border: 1px solid #90cdf4; display: none; text-align: center; }
        .result-number { font-size: 28px; font-weight: bold; color: #2c5282; margin: 10px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Calculadora de Matrices</h2>
    <p class="subtitle">Calcula la determinante de una matriz 3x3.</p>
    
    <div class="matrix-grid">
        <input type="number" id="m00" placeholder="a11" required>
        <input type="number" id="m01" placeholder="a12" required>
        <input type="number" id="m02" placeholder="a13" required>
        
        <input type="number" id="m10" placeholder="a21" required>
        <input type="number" id="m11" placeholder="a22" required>
        <input type="number" id="m12" placeholder="a23" required>
        
        <input type="number" id="m20" placeholder="a31" required>
        <input type="number" id="m21" placeholder="a32" required>
        <input type="number" id="m22" placeholder="a33" required>
    </div>

    <button onclick="calculateDeterminant()">Calcular Determinante</button>

    <div class="result-box" id="resultBox">
        <div style="color: #2b6cb0; font-size: 14px; font-weight: bold;">Determinante |A| =</div>
        <div class="result-number" id="resultOutput">0</div>
    </div>
</div>

<script>
    function calculateDeterminant() {
        // 1. Obtenemos los 9 valores de la matriz y los convertimos a números (float)
        let m00 = parseFloat(document.getElementById('m00').value) || 0;
        let m01 = parseFloat(document.getElementById('m01').value) || 0;
        let m02 = parseFloat(document.getElementById('m02').value) || 0;
        
        let m10 = parseFloat(document.getElementById('m10').value) || 0;
        let m11 = parseFloat(document.getElementById('m11').value) || 0;
        let m12 = parseFloat(document.getElementById('m12').value) || 0;
        
        let m20 = parseFloat(document.getElementById('m20').value) || 0;
        let m21 = parseFloat(document.getElementById('m21').value) || 0;
        let m22 = parseFloat(document.getElementById('m22').value) || 0;

        // 2. Aplicamos la lógica matemática (Expansión por cofactores de la fila 1)
        let term1 = m00 * ((m11 * m22) - (m12 * m21));
        let term2 = m01 * ((m10 * m22) - (m12 * m20));
        let term3 = m02 * ((m10 * m21) - (m11 * m20));

        let determinant = term1 - term2 + term3;

        // 3. Mostramos el resultado en pantalla
        document.getElementById('resultOutput').innerText = determinant;
        document.getElementById('resultBox').style.display = "block";
    }
</script>

</body>
</html>
