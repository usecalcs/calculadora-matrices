<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Matrices y Vectores UTN</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 850px; width: 100%; margin-top: 20px; }
        h2 { text-align: center; color: #1a365d; margin-top: 0; }
        
        .controls-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 15px; border-radius: 8px; }
        .controls-row { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .controls-row select, .controls-row input { padding: 8px; border-radius: 5px; border: 1px solid #cbd5e0; }
        .controls-row input { width: 60px; text-align: center; }
        
        button { padding: 12px 20px; background-color: #3182ce; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; width: 100%; margin-top: 10px; }
        button:hover { background-color: #2b6cb0; }
        
        #workspace { display: flex; gap: 30px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .matrix-wrapper { display: flex; flex-direction: column; align-items: center; }
        .matrix-label { font-weight: bold; color: #2d3748; margin-bottom: 10px; background: #edf2f7; padding: 5px 15px; border-radius: 15px; }
        
        .dynamic-grid { display: grid; gap: 5px; padding: 10px; border-left: 3px solid #1a365d; border-right: 3px solid #1a365d; background: #f7fafc; border-radius: 4px; }
        .dynamic-grid input { width: 55px; height: 50px; text-align: center; font-size: 16px; border: 1px solid #cbd5e0; border-radius: 4px; }

        #step-box { margin-top: 30px; padding: 20px; background-color: #2c5282; border-radius: 8px; color: white; display: none; text-align: left; }
        .step-line { font-family: 'Courier New', monospace; margin-bottom: 8px; padding: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; border-left: 4px solid #f6e05e; }
        .res-det { font-size: 28px; font-weight: bold; color: #1a365d; padding: 15px; background: #ebf8ff; border-radius: 8px; display: inline-block; border: 2px solid #3182ce; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Calculadora de Álgebra UTN</h2>
    
    <div class="controls-group">
        <div class="controls-row">
            <label><b>Operación:</b></label>
            <select id="operation" onchange="actualizarInterfaz()">
                <optgroup label="Matrices">
                    <option value="mult">Producto A × B</option>
                    <option value="det">Determinante |A|</option>
                    <option value="inv">Inversa A⁻¹</option>
                    <option value="tras">Traspuesta Aᵀ</option>
                </optgroup>
                <optgroup label="Vectores (R³)">
                    <option value="v_esc">Producto Escalar (u · v)</option>
                    <option value="v_vec">Producto Vectorial (u × v)</option>
                </optgroup>
            </select>
        </div>
        
        <div id="dims-matrices" class="controls-row">
            <span><b>Matriz A:</b></span>
            <input type="number" id="rowsA" value="3" min="1" max="5" onchange="setupWorkspace()"> x 
            <input type="number" id="colsA" value="3" min="1" max="5" onchange="setupWorkspace()">
            <span id="label-b" style="margin-left:20px;"><b>Matriz B:</b></span>
            <input type="number" id="rowsB" value="3" min="1" max="5" onchange="setupWorkspace()"> x 
            <input type="number" id="colsB" value="3" min="1" max="5" onchange="setupWorkspace()">
        </div>
    </div>

    <div id="workspace"></div>
    <button onclick="calcular()">Resolver con Paso a Paso</button>
    <div id="step-box"><h3>Desarrollo del procedimiento:</h3><div id="step-content"></div></div>
</div>

<script>
    function actualizarInterfaz() {
        let op = document.getElementById('operation').value;
        let dims = document.getElementById('dims-matrices');
        let labelB = document.getElementById('label-b');
        let rb = document.getElementById('rowsB'), cb = document.getElementById('colsB');

        dims.style.display = (op.startsWith('v_')) ? 'none' : 'flex';
        labelB.style.display = (op === 'mult') ? 'inline' : 'none';
        rb.style.display = cb.style.display = (op === 'mult') ? 'inline' : 'none';
        
        if (op === 'det' || op === 'inv') document.getElementById('colsA').value = document.getElementById('rowsA').value;
        setupWorkspace();
    }

    function setupWorkspace() {
        let op = document.getElementById('operation').value;
        let ws = document.getElementById('workspace');
        ws.innerHTML = "";
        let ra = parseInt(document.getElementById('rowsA').value), ca = parseInt(document.getElementById('colsA').value);

        if (op.startsWith('v_')) {
            crearMatrizUI(ws, 'Vector u', 1, 3, 'u');
            crearMatrizUI(ws, 'Vector v', 1, 3, 'v');
        } else {
            crearMatrizUI(ws, 'Matriz A', ra, ca, 'A');
            if (op === 'mult') crearMatrizUI(ws, 'Matriz B', parseInt(document.getElementById('rowsB').value), parseInt(document.getElementById('colsB').value), 'B');
        }
    }

    function crearMatrizUI(cont, tit, f, c, id) {
        let w = document.createElement('div'); w.className = 'matrix-wrapper';
        w.innerHTML = `<div class="matrix-label">${tit}</div>`;
        let g = document.createElement('div'); g.className = 'dynamic-grid';
        g.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
        for(let i=0; i<f; i++) for(let j=0; j<c; j++) {
            let inp = document.createElement('input'); inp.type = 'number'; inp.id = `${id}_${i}_${j}`; inp.placeholder = `${id}${i+1}${j+1}`;
            g.appendChild(inp);
        }
        w.appendChild(g); cont.appendChild(w);
    }

    function calcular() {
        let op = document.getElementById('operation').value;
        let ra = parseInt(document.getElementById('rowsA').value), ca = parseInt(document.getElementById('colsA').value);
        let steps = [], resMatriz = null, resUnico = null;

        document.getElementById('contenedor-resultado')?.remove();

        if (op.startsWith('v_')) {
            let u = extraerMatriz('u', 1, 3)[0], v = extraerMatriz('v', 1, 3)[0];
            if (op === 'v_esc') {
                resUnico = u[0]*v[0] + u[1]*v[1] + u[2]*v[2];
                steps.push(`u · v = (${u[0]}*${v[0]}) + (${u[1]}*${v[1]}) + (${u[2]}*${v[2]}) = ${resUnico}`);
            } else {
                resMatriz = [[u[1]*v[2]-u[2]*v[1], u[2]*v[0]-u[0]*v[2], u[0]*v[1]-u[1]*v[0]]];
                steps.push(`i: (${u[1]}*${v[2]}) - (${u[2]}*${v[1]}) = ${resMatriz[0][0]}`);
                steps.push(`j: -((${u[0]}*${v[2]}) - (${u[2]}*${v[0]})) = ${resMatriz[0][1]}`);
                steps.push(`k: (${u[0]}*${v[1]}) - (${u[1]}*${v[0]}) = ${resMatriz[0][2]}`);
            }
        } else {
            let A = extraerMatriz('A', ra, ca);
            if (op === 'mult') {
                let rb = parseInt(document.getElementById('rowsB').value), cb = parseInt(document.getElementById('colsB').value);
                if (ca !== rb) { alert("Columnas A != Filas B"); return; }
                let B = extraerMatriz('B', rb, cb);
                resMatriz = Array.from({length: ra}, () => Array(cb).fill(0));
                for(let i=0; i<ra; i++) for(let j=0; j<cb; j++) {
                    let s = 0, txt = "";
                    for(let k=0; k<ca; k++) { s += A[i][k]*B[k][j]; txt += `(${A[i][k]}*${B[k][j]})` + (k<ca-1?"+":""); }
                    resMatriz[i][j] = s; steps.push(`C${i+1}${j+1}: ${txt} = ${s}`);
                }
            } else if (op === 'det') {
                resUnico = obtenerDeterminante(A, steps, "A");
            } else if (op === 'tras') {
                resMatriz = A[0].map((_, c) => A.map(r => r[c]));
                steps.push("Intercambiando filas por columnas...");
            } else if (op === 'inv') {
                let d = obtenerDeterminante(A);
                if (d === 0) { alert("Det = 0, no hay inversa"); return; }
                steps.push(`1. Determinante |A| = ${d}`);
                let adj = A.map((r, i) => r.map((_, j) => {
                    let sub = A.filter((_, fi) => fi !== i).map(row => row.filter((_, ci) => ci !== j));
                    let val = ((i+j)%2===0?1:-1) * obtenerDeterminante(sub);
                    steps.push(`Cofactor A${i+1}${j+1}: ${val}`);
                    return val;
                }));
                resMatriz = adj[0].map((_, c) => adj.map(r => r[c])).map(r => r.map(v => Number((v/d).toFixed(3))));
                steps.push("2. Traspuesta de adjunta y división por det...");
            }
        }

        if(resMatriz) dibujarResultado(resMatriz, "Resultado");
        if(resUnico !== null) mostrarResultadoUnico("Resultado", resUnico);
        
        let sbox = document.getElementById('step-box'), scont = document.getElementById('step-content');
        scont.innerHTML = steps.map(s => `<div class="step-line">${s}</div>`).join('');
        sbox.style.display = "block";
    }

    function extraerMatriz(p, f, c) {
        let m = []; for(let i=0; i<f; i++) {
            let fila = []; for(let j=0; j<c; j++) fila.push(parseFloat(document.getElementById(`${p}_${i}_${j}`).value) || 0);
            m.push(fila);
        } return m;
    }

    function obtenerDeterminante(M, steps, label) {
        if (M.length === 1) return M[0][0];
        if (M.length === 2) return M[0][0]*M[1][1] - M[0][1]*M[1][0];
        let d = 0;
        for(let j=0; j<M.length; j++) {
            let sub = M.filter((_, i) => i !== 0).map(row => row.filter((_, ci) => ci !== j));
            let s = (j%2===0?1:-1);
            let subDet = obtenerDeterminante(sub);
            if(steps) steps.push(`Laplace fila 1: ${s} * ${M[0][j]} * det(Submatriz) [${subDet}]`);
            d += s * M[0][j] * subDet;
        }
        return d;
    }

    function dibujarResultado(m, tit) {
        let c = document.createElement('div'); c.id = 'contenedor-resultado'; c.style.textAlign='center';
        c.innerHTML = `<h3>${tit}</h3>`;
        let g = document.createElement('div'); g.className = 'dynamic-grid';
        g.style.gridTemplateColumns = `repeat(${m[0].length}, 1fr)`;
        g.style.display = 'inline-grid'; g.style.background = '#ebf8ff';
        m.flat().forEach(v => {
            let d = document.createElement('div'); d.style.padding='15px'; d.style.background='white'; d.style.border='1px solid #90cdf4'; d.style.fontWeight='bold'; d.innerText=v;
            g.appendChild(d);
        });
        c.appendChild(g); document.querySelector('.app-container').appendChild(c);
    }

    function mostrarResultadoUnico(t, v) {
        let c = document.createElement('div'); c.id = 'contenedor-resultado'; c.style.textAlign='center';
        c.innerHTML = `<h3>${t}</h3><div class="res-det">${v}</div>`;
        document.querySelector('.app-container').appendChild(c);
    }

    window.onload = actualizarInterfaz;
</script>
</body>
</html>
