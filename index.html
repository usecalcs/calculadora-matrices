    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Álgebra </title>
    <style>
        :root { --primary: #3182ce; --dark: #1a365d; --bg: #f0f4f8; --accent: #f6e05e; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 850px; width: 100%; }
        h2 { text-align: center; color: var(--dark); margin-bottom: 25px; font-weight: 800; letter-spacing: -0.5px; }
        
        .controls-group { background: #edf2f7; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .controls-row { display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        select, input { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); ring: 2px var(--primary); }
        input[type="number"] { width: 65px; text-align: center; font-weight: bold; }
        
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(49,130,206,0.2); }
        button:hover { background: #2b6cb0; transform: translateY(-1px); }

        #workspace { display: flex; gap: 25px; justify-content: center; margin: 25px 0; flex-wrap: wrap; }
        .matrix-wrapper { display: flex; flex-direction: column; align-items: center; }
        .matrix-label { font-weight: bold; color: #4a5568; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .dynamic-grid { display: grid; gap: 8px; padding: 12px; border-radius: 8px; background: #fff; border: 2px solid #e2e8f0; border-left: 4px solid var(--dark); border-right: 4px solid var(--dark); }
        .dynamic-grid input { width: 60px; height: 50px; font-size: 16px; background: #f8fafc; }

        #step-box { display: none; margin-top: 30px; padding: 25px; background: var(--dark); border-radius: 12px; color: #fff; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        #step-box h3 { color: var(--accent); margin-top: 0; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .step-line { font-family: 'Fira Code', 'Courier New', monospace; font-size: 14px; margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 6px; }
        
        #result-area { text-align: center; margin-top: 20px; }
        .res-badge { font-size: 24px; font-weight: bold; color: var(--dark); padding: 15px 30px; background: #ebf8ff; border-radius: 10px; border: 2px solid var(--primary); display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Álgebra Universitaria </h2>
    
    <div class="controls-group">
        <div class="controls-row">
            <label><b>Operación:</b></label>
            <select id="operation" onchange="actualizarInterfaz()">
                <optgroup label="Matrices">
                    <option value="mult">Producto A × B</option>
                    <option value="det">Determinante |A|</option>
                    <option value="inv">Inversa A⁻¹</option>
                    <option value="tras">Traspuesta Aᵀ</option>
                </optgroup>
                <optgroup label="Vectores">
                    <option value="v_esc">Producto Escalar (u · v)</option>
                    <option value="v_vec">Producto Vectorial (u × v)</option>
                    <option value="v_ang">Ángulo entre vectores (θ)</option>
                    <option value="v_proy">Proyección de u sobre v</option>
                </optgroup>
            </select>
        </div>
        
        <div id="dims-panel" class="controls-row">
            <span id="dim-text-1"><b>Matriz A:</b></span>
            <input type="number" id="rowsA" value="3" min="1" max="6" onchange="setupWorkspace()">
            <span id="x-separator"> x </span>
            <input type="number" id="colsA" value="3" min="1" max="6" onchange="setupWorkspace()">
            
            <span id="label-b" style="margin-left:15px;"><b>Matriz B:</b></span>
            <input type="number" id="rowsB" value="3" min="1" max="6" onchange="setupWorkspace()">
            <span id="x-separator-b"> x </span>
            <input type="number" id="colsB" value="3" min="1" max="6" onchange="setupWorkspace()">
        </div>
    </div>

    <div id="workspace"></div>
    <button onclick="calcular()">CALCULAR Y EXPLICAR PASO A PASO</button>
    <div id="result-area"></div>
    <div id="step-box"><h3>Desarrollo del procedimiento</h3><div id="step-content"></div></div>
</div>

<div id="step-box"><h3>Desarrollo del procedimiento</h3><div id="step-content"></div></div>

        <footer style="margin-top: 40px; text-align: center; font-size: 14px; color: #718096; border-top: 1px solid #e2e8f0; padding-top: 20px; padding-bottom: 20px;">
            <p style="margin-bottom: 10px;"><b>UseCalcs</b> - Herramientas para Estudiantes</p>
            <div style="display: flex; justify-content: center; gap: 15px;">
                <a href="https://getchatlink.github.io/" style="color: #3182ce; text-decoration: none; font-weight: bold;">GetChatLink</a>
                <span style="color: #cbd5e0;">|</span>
                <a href="https://usecalcs.github.io/calculadora-matrices/" style="color: #3182ce; text-decoration: none; font-weight: bold;">Calculadora de Matrices</a>
            </div>
            <p style="font-size: 11px; margin-top: 15px; opacity: 0.6;">Desarrollado por Dante</p>
        </footer>

    </div> 
  
  <script>
  
<script>
    function actualizarInterfaz() {
        let op = document.getElementById('operation').value;
        let isVec = op.startsWith('v_');
        let rA = document.getElementById('rowsA'), cA = document.getElementById('colsA');
        let pB = document.getElementById('label-b'), rB = document.getElementById('rowsB'), cB = document.getElementById('colsB');

        if (isVec) {
            document.getElementById('dim-text-1').innerHTML = "<b>Dimensión (n):</b>";
            cA.style.display = 'none'; document.getElementById('x-separator').style.display = 'none';
            pB.style.display = 'none'; rB.style.display = 'none'; cB.style.display = 'none';
            document.getElementById('x-separator-b').style.display = 'none';
            if (op === 'v_vec') rA.value = 3; 
        } else {
            document.getElementById('dim-text-1').innerHTML = "<b>Matriz A:</b>";
            cA.style.display = 'inline'; document.getElementById('x-separator').style.display = 'inline';
            pB.style.display = (op === 'mult' ? 'inline' : 'none');
            rB.style.display = (op === 'mult' ? 'inline' : 'none');
            cB.style.display = (op === 'mult' ? 'inline' : 'none');
            document.getElementById('x-separator-b').style.display = (op === 'mult' ? 'inline' : 'none');
            if (op === 'det' || op === 'inv') cA.value = rA.value;
        }
        setupWorkspace();
    }

    function setupWorkspace() {
        let op = document.getElementById('operation').value;
        let ws = document.getElementById('workspace'); ws.innerHTML = "";
        let n = parseInt(document.getElementById('rowsA').value);

        if (op.startsWith('v_')) {
            crearMatrizUI(ws, 'Vector u', 1, n, 'u');
            crearMatrizUI(ws, 'Vector v', 1, n, 'v');
        } else {
            let rA = n, cA = parseInt(document.getElementById('colsA').value);
            crearMatrizUI(ws, 'Matriz A', rA, cA, 'A');
            if (op === 'mult') crearMatrizUI(ws, 'Matriz B', parseInt(document.getElementById('rowsB').value), parseInt(document.getElementById('colsB').value), 'B');
        }
    }

    function crearMatrizUI(cont, tit, f, c, id) {
        let w = document.createElement('div'); w.className = 'matrix-wrapper';
        w.innerHTML = `<div class="matrix-label">${tit}</div>`;
        let g = document.createElement('div'); g.className = 'dynamic-grid';
        g.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
        for(let i=0; i<f; i++) for(let j=0; j<c; j++) {
            let inp = document.createElement('input'); inp.type = 'number'; inp.id = `${id}_${i}_${j}`;
            g.appendChild(inp);
        }
        w.appendChild(g); cont.appendChild(w);
    }

    function calcular() {
        let op = document.getElementById('operation').value;
        let n = parseInt(document.getElementById('rowsA').value);
        let steps = [], resM = null, resU = null;
        document.getElementById('result-area').innerHTML = "";

        if (op.startsWith('v_')) {
            let u = extraerMatriz('u', 1, n)[0], v = extraerMatriz('v', 1, n)[0];
            let esc = u.reduce((acc, val, i) => acc + val*v[i], 0);
            let modU = Math.sqrt(u.reduce((acc, val) => acc + val**2, 0));
            let modV = Math.sqrt(v.reduce((acc, val) => acc + val**2, 0));

            if (op === 'v_esc') {
                resU = esc; steps.push(`u · v = Σ(uᵢ * vᵢ) = ${resU}`);
            } else if (op === 'v_vec') {
                if (n !== 3) { alert("Solo en R³"); return; }
                resM = [[u[1]*v[2]-u[2]*v[1], u[2]*v[0]-u[0]*v[2], u[0]*v[1]-u[1]*v[0]]];
                steps.push(`Componentes del producto vectorial calculadas.`);
            } else if (op === 'v_ang') {
                let cosTheta = esc / (modU * modV);
                resU = (Math.acos(cosTheta) * 180 / Math.PI).toFixed(2) + "°";
                steps.push(`1. |u| = ${modU.toFixed(3)} |v| = ${modV.toFixed(3)}`);
                steps.push(`2. cos(θ) = (u·v) / (|u||v|) = ${cosTheta.toFixed(4)}`);
            } else if (op === 'v_proy') {
                let factor = esc / (modV**2);
                resM = [v.map(val => Number((val * factor).toFixed(3)))];
                steps.push(`1. Escalar de proyección (u·v / |v|²) = ${factor.toFixed(4)}`);
                steps.push(`2. Proy = factor * Vector v`);
            }
        } else {
            let A = extraerMatriz('A', n, parseInt(document.getElementById('colsA').value));
            if (op === 'mult') {
                let B = extraerMatriz('B', parseInt(document.getElementById('rowsB').value), parseInt(document.getElementById('colsB').value));
                if (A[0].length !== B.length) { alert("Columnas A ≠ Filas B"); return; }
                resM = Array.from({length: A.length}, () => Array(B[0].length).fill(0));
                for(let i=0; i<A.length; i++) for(let j=0; j<B[0].length; j++) {
                    for(let k=0; k<A[0].length; k++) resM[i][j] += A[i][k]*B[k][j];
                    steps.push(`C${i+1}${j+1} = ${resM[i][j]}`);
                }
            } else if (op === 'det') { resU = obtenerDeterminante(A, steps); 
            } else if (op === 'tras') { resM = A[0].map((_, c) => A.map(r => r[c])); steps.push("Intercambio i ↔ j realizado.");
            } else if (op === 'inv') {
                let d = obtenerDeterminante(A); if(d===0){alert("Det=0"); return;}
                steps.push(`|A| = ${d}`);
                let adjT = A.map((r, i) => r.map((_, j) => {
                    let sub = A.filter((_, fi) => fi !== i).map(row => row.filter((_, ci) => ci !== j));
                    return ((i+j)%2===0?1:-1) * obtenerDeterminante(sub);
                }));
                resM = adjT[0].map((_, c) => adjT.map(r => r[c])).map(r => r.map(v => Number((v/d).toFixed(3))));
                steps.push("Matriz adjunta traspuesta y dividida por determinante.");
            }
        }

        if(resM) dibujarResultado(resM, "Matriz Resultante");
        if(resU !== null) mostrarResultadoUnico("Resultado Final", resU);
        document.getElementById('step-content').innerHTML = steps.map(s => `<div class="step-line">${s}</div>`).join('');
        document.getElementById('step-box').style.display = "block";
    }

    function extraerMatriz(p, f, c) {
        let m = []; for(let i=0; i<f; i++) {
            let fila = []; for(let j=0; j<c; j++) fila.push(parseFloat(document.getElementById(`${p}_${i}_${j}`).value) || 0);
            m.push(fila);
        } return m;
    }

    function obtenerDeterminante(M, steps) {
        if (M.length === 1) return M[0][0];
        if (M.length === 2) return M[0][0]*M[1][1] - M[0][1]*M[1][0];
        let d = 0;
        for(let j=0; j<M.length; j++) {
            let sub = M.filter((_, i) => i !== 0).map(row => row.filter((_, ci) => ci !== j));
            let s = (j%2===0?1:-1), subDet = obtenerDeterminante(sub);
            if(steps && M.length === 3) steps.push(`Laplace: ${s} * ${M[0][j]} * (${subDet})`);
            d += s * M[0][j] * subDet;
        }
        return d;
    }

    function dibujarResultado(m, tit) {
        let r = document.getElementById('result-area');
        r.innerHTML = `<h3>${tit}</h3>`;
        let g = document.createElement('div'); g.className = 'dynamic-grid';
        g.style.gridTemplateColumns = `repeat(${m[0].length}, 1fr)`;
        g.style.display = 'inline-grid'; g.style.background = '#edf2f7';
        m.flat().forEach(v => {
            let d = document.createElement('div'); d.style.padding='12px'; d.style.background='white'; d.style.border='1px solid #90cdf4'; d.style.fontWeight='bold'; d.innerText=v;
            g.appendChild(d);
        });
        r.appendChild(g);
    }

    function mostrarResultadoUnico(t, v) {
        document.getElementById('result-area').innerHTML = `<h3>${t}</h3><div class="res-badge">${v}</div>`;
    }

    window.onload = actualizarInterfaz;
</script>
</body>
</html>
